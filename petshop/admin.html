<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Patas Felizes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

  <!-- LOGIN SECTION -->
  <div id="loginSection" class="flex-grow flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border-t-4 border-yellow-500">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-yellow-600">Área Administrativa</h2>
        <p class="text-gray-500 text-sm mt-2">Faça login para gerenciar o site</p>
      </div>
      <form id="formLogin">
        <div class="mb-4">
          <label class="block text-gray-700 font-semibold mb-2">Usuário</label>
          <input type="text" id="username" class="w-full border px-4 py-2 rounded-lg outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500" required>
        </div>
        <div class="mb-6">
          <label class="block text-gray-700 font-semibold mb-2">Senha</label>
          <input type="password" id="password" class="w-full border px-4 py-2 rounded-lg outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500" required>
        </div>
        <button type="submit" class="w-full bg-yellow-500 text-white font-bold py-3 px-4 rounded-lg hover:bg-yellow-600 transition shadow-md">Entrar</button>
      </form>
      <p id="loginError" class="text-red-500 text-center mt-4 hidden font-semibold bg-red-50 py-2 rounded">Usuário ou senha incorretos!</p>
    </div>
  </div>

  <!-- ADMIN DASHBOARD SECTION -->
  <div id="adminSection" class="hidden flex-grow flex flex-col md:flex-row">
    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-gray-800 text-white flex flex-col shadow-xl">
      <div class="p-6 text-xl font-bold border-b border-gray-700 flex items-center gap-2">
        <span class="text-yellow-400">🐾</span> Painel Admin
      </div>
      <nav class="flex-grow flex flex-col p-4 gap-2">
        <button onclick="showTab('leads')" class="text-left px-4 py-3 rounded-lg hover:bg-gray-700 focus:bg-gray-700 transition">✉️ Leads (Mensagens)</button>
        <button onclick="showTab('depoimentos')" class="text-left px-4 py-3 rounded-lg hover:bg-gray-700 focus:bg-gray-700 transition">💬 Depoimentos</button>
        <button onclick="showTab('galeria')" class="text-left px-4 py-3 rounded-lg hover:bg-gray-700 focus:bg-gray-700 transition">📸 Galeria</button>
      </nav>
      <div class="p-4 border-t border-gray-700">
        <button onclick="logout()" class="w-full text-center text-red-400 font-bold py-2 hover:bg-red-900/30 rounded transition">Sair do Sistema</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-8 overflow-y-auto">
      
      <!-- Tab Leads -->
      <section id="tab-leads" class="tab-content hidden">
        <h2 class="text-3xl font-bold mb-6 text-gray-800">Mensagens Recebidas</h2>
        <div class="bg-white rounded-xl shadow-md overflow-x-auto border border-gray-100">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-gray-50 text-gray-600 border-b">
                <th class="p-4 font-semibold">Data</th>
                <th class="p-4 font-semibold">Nome</th>
                <th class="p-4 font-semibold">E-mail</th>
                <th class="p-4 font-semibold">Mensagem</th>
              </tr>
            </thead>
            <tbody id="leadsTableBody" class="divide-y divide-gray-100"></tbody>
          </table>
        </div>
      </section>

      <!-- Tab Depoimentos -->
      <section id="tab-depoimentos" class="tab-content hidden">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
          <h2 class="text-3xl font-bold text-gray-800">Gerenciar Depoimentos</h2>
          <button onclick="openModalDepoimento()" class="bg-green-500 text-white font-bold px-6 py-2 rounded-lg hover:bg-green-600 transition shadow-md">+ Novo Depoimento</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="depoimentosGrid"></div>
      </section>

      <!-- Tab Galeria -->
      <section id="tab-galeria" class="tab-content hidden">
        <h2 class="text-3xl font-bold mb-6 text-gray-800">Gerenciar Galeria</h2>
        <div class="bg-white p-6 rounded-xl shadow-md mb-8 border border-gray-100">
          <h3 class="font-bold text-lg mb-4 text-gray-700">Adicionar Nova Foto</h3>
          <form id="formFoto" class="flex flex-col md:flex-row gap-4 items-end">
              <div class="flex-1 w-full">
                <label class="block text-sm text-gray-600 mb-1">Nome do Pet</label>
                <input type="text" id="fotoNome" placeholder="Ex: Bob" required class="w-full border px-4 py-2 rounded-lg outline-none focus:border-yellow-500" />
              </div>
              <div class="flex-1 w-full">
                <label class="block text-sm text-gray-600 mb-1">Arquivo da Foto</label>
                <input type="file" id="fotoArquivo" accept="image/*" required class="w-full border px-4 py-2 rounded-lg outline-none" />
              </div>
              <button type="submit" class="bg-blue-500 text-white font-bold px-8 py-2 rounded-lg hover:bg-blue-600 transition shadow-md w-full md:w-auto h-11">Upload</button>
          </form>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="galeriaGrid"></div>
      </section>

    </main>
  </div>

  <!-- Modal Depoimento -->
  <div id="modalDepoimento" class="hidden fixed inset-0 bg-gray-900 bg-opacity-60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
       <h3 class="text-2xl font-bold mb-6 text-gray-800" id="modalTitle">Novo Depoimento</h3>
       <form id="formSalvarDepoimento">
          <input type="hidden" id="depoimentoId">
          <div class="mb-4">
              <label class="block font-semibold text-gray-700 mb-1">Nome do Cliente</label>
              <input type="text" id="depoimentoAutor" class="w-full border px-4 py-2 rounded-lg outline-none focus:border-yellow-500" required>
          </div>
          <div class="mb-4">
              <label class="block font-semibold text-gray-700 mb-1">Depoimento</label>
              <textarea id="depoimentoTexto" class="w-full border px-4 py-2 rounded-lg outline-none focus:border-yellow-500" rows="4" required></textarea>
          </div>
          <div class="mb-6">
              <label class="block font-semibold text-gray-700 mb-1">URL da Foto (opcional)</label>
              <input type="text" id="depoimentoAvatar" class="w-full border px-4 py-2 rounded-lg outline-none focus:border-yellow-500" placeholder="Ex: images/pessoa1.jpg">
          </div>
          <div class="flex justify-end gap-3">
              <button type="button" onclick="closeModalDepoimento()" class="px-6 py-2 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300 transition">Cancelar</button>
              <button type="submit" class="px-6 py-2 bg-green-500 text-white font-bold rounded-lg hover:bg-green-600 transition shadow-md">Salvar</button>
          </div>
       </form>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
